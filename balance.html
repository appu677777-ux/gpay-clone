<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1f1f1f] text-white p-3">

    <section class="max-w-md mx-auto p-4">
            
            <div class="flex gap-20 mb-2 mx-3./">
                <h1 class="text-lg font-semibold mt-2">Bank balance</h1>
                <button
                onclick="window.location.href='settings.html'"
                class="text-white text-3xl pb-2 ml-20">
                ←
            </button>
            </div>
            

            <div class="bg-[#1f1f1f] rounded-2xl p-5 shadow-lg">

                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h2 id="balance" class="text-4xl font-bold transition-transform duration-300"></h2>
                    </div>
                </div>

                <div
                    class="flex justify-between items-center text-sm text-gray-300">

                    <div>
                        <p>State Bank of India</p>
                        <p class="text-gray-500">Savings •••• 9093</p>
                    </div>

                    <img
                        src="https://images.seeklogo.com/logo-png/17/2/sbi-logo-png_seeklogo-177051.png"
                        class="w-20 h-10 object-contain bg-white rounded">

                </div>

            </div>
        </section>
    
</body>
<script>
// Initialize balance if not exists
if (!localStorage.getItem("balance")) {
    localStorage.setItem("balance", 1000);
}

// Initialize transactions
if (!localStorage.getItem("transactions")) {
    localStorage.setItem("transactions", JSON.stringify([]));
}

// Animate balance
function animateBalance(targetAmount) {
    let current = 0;
    const increment = targetAmount / 60; // speed control
    const element = document.getElementById("balance");

    const counter = setInterval(() => {
        current += increment;

        if (current >= targetAmount) {
            current = targetAmount;
            clearInterval(counter);
        }

        element.textContent = "₹" + Math.floor(current).toLocaleString("en-IN");
    }, 20);
}

// Get balance and animate
const balance = parseFloat(localStorage.getItem("balance"));
animateBalance(balance);
</script>
</html>
